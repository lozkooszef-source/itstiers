services:
  postgres:
    image: postgres:16
    container_name: itstiers-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: itstiers
      POSTGRES_USER: itstiers
      POSTGRES_PASSWORD: itstiers_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
